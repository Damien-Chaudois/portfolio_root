# Bloc HTTPS principal pour damien.chaudois.com
# Sert la page d'index du portfolio
server {
    listen 443 ssl;
    server_name damien.chaudois.com;

    # Certificats Let's Encrypt générés par Certbot
    # fullchain.pem inclut le certificat + la chaîne intermédiaire
    ssl_certificate     /etc/letsencrypt/live/damien.chaudois.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/damien.chaudois.com/privkey.pem;

    # Protocoles modernes uniquement — TLS 1.0 et 1.1 sont obsolètes et vulnérables
    ssl_protocols TLSv1.2 TLSv1.3;

    # Réponse temporaire — sera remplacée par le container du portfolio
    location / {
        return 200 "damien.chaudois.com fonctionne\n";
        add_header Content-Type text/plain;
    }
}